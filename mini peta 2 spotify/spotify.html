<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Sound</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="top-bar">
    <a href="spotify.html" class="logo">
      <svg class="logo-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="20" fill="#1ED760"/>
        <path d="M11 16.5C16.5 14.5 23.5 14.8 28.5 17.8" stroke="black" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M12 21C16.8 19.3 22.6 19.6 27 22.2" stroke="black" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M13 25.3C16.9 24 21.6 24.3 25 26.3" stroke="black" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      <span class="logo-word">Sound</span>
    </a>
  </div>

  <main class="auth-card">
    <h1><b>Welcome back</b></h1>
   <br>
   <br>

    <div class="social-buttons">
      <button onclick="window.location.href='https://www.facebook.com/';" class="btn-social">
        <svg viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.7 4.53-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.95.93-1.95 1.89v2.26h3.32l-.53 3.49h-2.79V24C19.61 23.1 24 18.1 24 12.07"/></svg>
        Continue with Facebook
    
      </button>
      <button onclick="window.location.href='https://accounts.google.com/v3/signin/identifier?continue=https%3A%2F%2Faccounts.google.com%2F&dsh=S-333752953%3A1784692186454932&followup=https%3A%2F%2Faccounts.google.com%2F&passive=1209600&flowName=GlifWebSignIn&flowEntry=ServiceLogin&ifkv=Ac50bxtzXbYeWRsX-hA7kNvi9rooLamunijz00dOygeXy9VzFY7aImpjLQJkILSBGYntw6MYrsr7tg';" class="btn-social">
        <svg viewBox="0 0 24 24"><path fill="#fff" d="M12.24 10.28v3.68h5.12c-.22 1.33-1.6 3.9-5.12 3.9-3.08 0-5.6-2.55-5.6-5.7s2.52-5.7 5.6-5.7c1.76 0 2.94.75 3.62 1.4l2.47-2.38C16.85 3.93 14.74 3 12.24 3 6.98 3 2.72 7.24 2.72 12.5s4.26 9.5 9.52 9.5c5.5 0 9.14-3.86 9.14-9.3 0-.62-.07-1.1-.15-1.57z"/></svg>
        Continue with Google
      </button>
      <button onclick="window.location.href ='https://account.apple.com/';" class="btn-social">
        <svg viewBox="0 0 24 24"><path fill="#fff" d="M16.36 1.05c.1 1.06-.32 2.1-.98 2.87-.68.78-1.77 1.39-2.85 1.3-.12-1.03.36-2.1 1-2.83.7-.8 1.9-1.4 2.83-1.34zM20.6 17.35c-.5 1.14-.74 1.65-1.38 2.66-.9 1.4-2.17 3.15-3.75 3.16-1.4.02-1.76-.9-3.66-.89-1.9.01-2.3.9-3.7.89-1.58-.02-2.78-1.6-3.68-3-2.52-3.9-2.78-8.48-1.23-10.92 1.1-1.73 2.83-2.75 4.45-2.75 1.65 0 2.7.9 4.07.9 1.32 0 2.13-.9 4.05-.9 1.44 0 2.97.79 4.06 2.14-3.57 1.96-2.99 7.06.77 8.7z"/></svg>
        Continue with Apple
      </button>
      
    </div>

    <div class="divider">or</div>

    <form class="auth-form" id="login-form" novalidate>
      <div class="field" id="email-field">
        <label for="email">Email or username</label>
        <input type="text" id="email" name="email" placeholder="Email or username" autocomplete="username">
        <span class="field-error">Please enter your email or username.</span>
      </div>

      <div class="field" id="password-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password">
        <span class="field-error">Please enter your password.</span>
      </div>

      <a href="#" style="color:#fff; font-size:14px; font-weight:700; text-decoration:underline; margin-top:-12px;">Forgot your password?</a>

      <button onclick="window.open('spotifymain.html', '_blank','noopener' )" class="btn-primary">Log in</button>
    </form>
  </main>

  <div class="auth-footer">
    Don't have an account? <a href="register.html">Sign up for Sound</a>
  </div>

  <div class="legal-bar">
    <a href="#">Legal</a>
    <a href="#">Safety & Privacy Center</a>
    <a href="#">Privacy Policy</a>
    <a href="#">Cookies</a>
    <a href="#">About Ads</a>
  </div>

  
</body>
</html>
